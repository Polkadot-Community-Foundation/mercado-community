name: Deploy to devnet

# Production deploy of the Mercado web app to Summit (Bulletin Chain + DotNS).
#
# Summit-only, production-only by design: on Summit every preview domain would be
# a fresh DotNS registration (~11 SUM + Bulletin storage that expires in ~14 days
# + a proof-of-personhood gate on short labels), so there are no per-PR preview
# deploys. PR validation lives in ci.yml (lint / typecheck / tests). Always targets
# the single production domain.
#
# Manual-dispatch only for now, so merging the Summit retargeting cannot fire a
# premature production deploy. Enable the push-to-main trigger below once the
# prerequisites are in place: the SUMMIT_DEPLOYER_KEY secret is set, the contracts
# are deployed and their addresses filled into .github/env, and mercado.dot is
# registered/owned by the deployer. The first deploy should be a deliberate manual run.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/web/**'
  #     - 'packages/**'
  #     - '.github/env'
  #     - '.github/workflows/deploy-paseo-next.yml'
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Skip deployment cache and force redeploy'
        type: boolean
        default: false

concurrency:
  group: deploy-paseo-next-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load environment config (devnet)
        run: grep -v '^#' .github/env | grep -v '^$' >> $GITHUB_ENV

      - name: Build
        run: pnpm build

      - name: Assert build is devnet (Summit/paseo assert disabled)
        run: |
          echo "devnet targets public Paseo — Summit/paseo bundle assert intentionally disabled"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-build
          path: apps/web/dist
          retention-days: 1

  deploy:
    name: Deploy to devnet
    needs: build
    uses: Polkadot-Community-Foundation/polkadot-app-deploy/.github/workflows/deploy.yml@v0.12.1
    with:
      dotns-domain: mercado.dot
      artifact-name: web-build
      env: devnet
      # Sign Bulletin storage txs with the (authorized) mnemonic account itself,
      # NOT the public BULLETIN_POOL accounts — those are never storage-authorized
      # on Summit and the preflight dies with "pool account N is not authorized".
      direct-signer: true
      # Source-build the CLI from the PCF fork at the v0.11.1 SHA. The reusable
      # workflow's npm-install path is hardcoded to @parity/polkadot-app-deploy
      # (wrong scope — PCF publishes @polkadot-community-foundation), so the
      # `polkadot-app-deploy-version` input resolves to a nonexistent @parity
      # release and fails ETARGET. The source-build path (repo + ref) avoids that.
      # 5795195 = v0.12.1 (ships the built-in `devnet` env — public Paseo
      # AH 1000/People 1004/Bulletin 1010; v0.11.1 did not know `devnet`).
      polkadot-app-deploy-repo: Polkadot-Community-Foundation/polkadot-app-deploy
      polkadot-app-deploy-ref: 57951954cbc02524e1e32169da3070f1f4f67a59
      # List mercado.dot in the browse app-directory by publishing it on-chain.
      # The reusable workflow calls Publisher.publish(label) when publish: true.
      # NOTE: the devnet environment has no PUBLISHER contract wired yet, so this
      # is a non-fatal skip today (the .dot content still deploys); it starts
      # listing automatically once a devnet Publisher is configured.
      publish: true
      skip-cache: ${{ inputs.skip-cache || false }}
      max-retries: 10
    secrets:
      # Summit Bulletin-authorized uploader / DotNS name owner for mercado.dot.
      # Must be set in repo secrets before the first Summit deploy.
      mnemonic: ${{ secrets.SUMMIT_DEPLOYER_KEY }}
